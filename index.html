<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riders of Pitteburgh Roubaix</title>
    <link rel="icon" href="images/favicon.png">
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Monomakh&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="loader" id="loader" aria-live="polite">
      <p class="loader-label">Loading images</p>
      <p class="loader-progress" id="loader-progress">0 / 0</p>
    </div>

    <main class="page-shell">
      <section class="intro" id="intro">
        <h1>THE RIDERS OF</h1>
        <h1>PITTSBURGH ROUBAIX</h1>
        <p class="instruction">
          Captured at Duck Hollow along the Monongahela River, 2026.
          <br>
          Scroll right to begin.
        </p>
      </section>

      <section class="gallery-wrap">
        <div class="gallery" id="gallery" aria-label="Horizontal image strip"></div>
        <div class="scrollbar-overlay" id="scrollbar-overlay" aria-hidden="true">
          <div class="scrollbar-thumb" id="scrollbar-thumb"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="footer">
      <p class="footer-text">
        © 2026 <a href="https://studiohuahong.com">studiohuahong</a>. All rights reserved.
      </p>
      <button class="footer-button" id="back-to-front" type="button">Back to Front</button>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
